<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SST — Login</title>
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/static/style.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card { width: 340px; max-width: calc(100vw - 32px); }
  .login-title { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .login-icon { font-size: 26px; }
  .login-sub { font-size: 12px; color: var(--text-2); margin-bottom: 18px; }
  .login-error { font-size: 12.5px; color: var(--red); margin-top: 10px; min-height: 1em; }
  .login-actions { margin-top: 14px; display: flex; justify-content: flex-end; }
</style>
</head>
<body>
  <div class="card login-card">
    <div class="login-title"><span class="login-icon">🎙️</span><strong>SST</strong></div>
    <div class="login-sub">Enter the API key to continue</div>
    <label>API key
      <input type="password" id="key" placeholder="key…" autofocus>
    </label>
    <div class="login-actions">
      <button class="btn primary" id="login-btn">Login</button>
    </div>
    <div class="login-error" id="login-error"></div>
  </div>
  <script>
    const $ = (s) => document.querySelector(s);
    function nextUrl() {
      const params = new URLSearchParams(location.search);
      return params.get("next") || "/";
    }
    async function doLogin() {
      const key = $("#key").value;
      $("#login-error").textContent = "";
      const resp = await fetch("/login", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key }),
      });
      if (resp.ok) {
        location.href = nextUrl();
        return;
      }
      const err = await resp.json().catch(() => ({}));
      $("#login-error").textContent = err.detail || "Login failed";
    }
    $("#login-btn").addEventListener("click", doLogin);
    $("#key").addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
  </script>
</body>
</html>
